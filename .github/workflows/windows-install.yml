name: Windows install

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  managed-install:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install like VibeAround
        run: npm install --legacy-peer-deps --ignore-scripts
      - run: npm run build
      - name: Import the runtime dependency graph
        run: node --input-type=module --eval "await import('./dist/bot.js')"
